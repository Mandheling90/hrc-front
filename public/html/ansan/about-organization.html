<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조직도/연락처</title>
  <link rel="stylesheet" as="style" crossorigin="anonymous" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root {
      --color-primary: #9f1836;
      --color-secondary: #c09c63;
      --color-secondary-bg: #fdf9f4;
      --color-secondary-hover: #dbbf93;
      --color-white: #ffffff;
      --color-darken: #000000;
      --color-border: #bbbbbb;
      --color-text-secondary: #636363;
      --color-text-tertiary: #8c8c8c;
      --color-accent-bg: #FEF8F8;
      --color-surface: #f9f9f9;
      --font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    [data-theme='dark'] {
      --color-primary: #c9304e;
      --color-secondary-bg: #2a1a1e;
      --color-secondary-hover: #4a3028;
      --color-white: #1e1e1e;
      --color-darken: #bdbdbd;
      --color-border: #333333;
      --color-text-secondary: #bdbdbd;
      --color-text-tertiary: #7b8393;
      --color-accent-bg: #2a1a1e;
      --color-surface: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; line-height: 1.5; -webkit-text-size-adjust: 100%; word-break: keep-all; }
    body {
      font-family: var(--font-family);
      background-color: var(--color-white);
      color: var(--color-darken);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background-color 0.2s, color 0.2s;
    }
    a { text-decoration: none; color: inherit; }

    .wrap { min-height: 100vh; display: flex; flex-direction: column; background-color: var(--color-white); }
    .main { flex: 1; padding: 64px 0 80px; }
    .container { max-width: 1530px; margin: 0 auto; padding: 0 50px; }

    .page-title {
      font-size: 40px; font-weight: 700; color: var(--color-darken);
      text-align: center; margin: 0 0 64px; line-height: 1.5; letter-spacing: -1.6px;
    }

    /* Organization Chart */
    .org-chart {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; max-width: 1200px; margin: 0 auto; padding: 32px 0; position: relative;
    }
    .org-image-desktop, .org-image-tablet, .org-image-mobile {
      width: 100%; height: auto; object-fit: contain;
    }
    .org-image-desktop { display: block; }
    .org-image-tablet { display: none; }
    .org-image-mobile { display: none; }

    /* Tablet (769px ~ 1429px) */
    @media (min-width: 769px) and (max-width: 1429px) {
      .main { padding: 40px 0 48px; }
      .container { padding: 0 24px; }
      .page-title { font-size: 36px; margin: 0 0 48px; letter-spacing: -1.44px; }

      .org-image-desktop { display: none; }
      .org-image-tablet { display: block; max-width: 660px; max-height: 680px; }
      .org-image-mobile { display: none; }
    }

    /* Mobile (768px and below) */
    @media (max-width: 768px) {
      .main { padding: 24px 0 40px; }
      .container { padding: 0 16px; }
      .page-title { font-size: 24px; margin: 0 0 24px; letter-spacing: -0.96px; }

      .org-image-desktop { display: none; }
      .org-image-tablet { display: none; }
      .org-image-mobile { display: block; max-width: 320px; max-height: 930px; }
    }
  </style>
</head>
