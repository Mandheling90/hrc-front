<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진료협력센터 의뢰</title>
  <link rel="stylesheet" as="style" crossorigin="anonymous" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root {
      --color-primary: #9f1836;
      --color-secondary: #c09c63;
      --color-secondary-bg: #fdf9f4;
      --color-secondary-hover: #dbbf93;
      --color-white: #ffffff;
      --color-darken: #000000;
      --color-border: #bbbbbb;
      --color-text-secondary: #636363;
      --color-text-tertiary: #8c8c8c;
      --color-accent-bg: #FEF8F8;
      --color-surface: #f9f9f9;
      --font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    }

    [data-theme='dark'] {
      --color-primary: #c9304e;
      --color-secondary-bg: #2a1a1e;
      --color-secondary-hover: #4a3028;
      --color-white: #1e1e1e;
      --color-darken: #bdbdbd;
      --color-border: #333333;
      --color-text-secondary: #bdbdbd;
      --color-text-tertiary: #7b8393;
      --color-accent-bg: #2a1a1e;
      --color-surface: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; line-height: 1.5; -webkit-text-size-adjust: 100%; word-break: keep-all; }
    body {
      font-family: var(--font-family);
      background-color: var(--color-white);
      color: var(--color-darken);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background-color 0.2s, color 0.2s;
    }
    a { text-decoration: none; color: inherit; }

    .wrap { min-height: 100vh; display: flex; flex-direction: column; background-color: var(--color-white); }
    .main { flex: 1; padding: 64px 0 80px; }
    .container { max-width: 1530px; margin: 0 auto; padding: 0 50px; }

    .page-title {
      font-size: 40px; font-weight: 700; color: var(--color-darken);
      text-align: center; margin: 0 0 64px; line-height: 1.5; letter-spacing: -1.6px;
    }

      background-size: cover; background-position: center; background-repeat: no-repeat;
      border-width: 1px; border-style: solid; border-color: #dbbf93;
      border-radius: 10px; padding: 40px 20px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: background-color 0.2s, border-color 0.2s;
    }
    [data-theme='dark'] .guide-box {
      background-color: #555; background-blend-mode: multiply; border-color: #4a3028;
    }
    .guide-box p {
      font-family: "Pretendard", sans-serif;
      font-size: 20px; font-weight: 400; color: var(--color-text-secondary);
      line-height: 1.5; letter-spacing: -0.8px; margin: 0;
      text-align: center; white-space: normal;
    }

    /* Service Section */
    .service-section { margin: 40px 0; width: 100%; }
    .service-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr; gap: 24px; width: 100%; padding-top: 5px;
    }
    .service-grid > * { min-width: 0; display: flex; flex-direction: column; }

    /* Service Card (base) */
    .service-card {
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      padding: 30px; background-color: var(--color-white);
      border-width: 1px; border-style: solid; border-color: #bbbbbb;
      border-radius: 10px;
      box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); text-align: center;
      color: inherit; width: 100%; height: 100%;
      transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    [data-theme='dark'] .service-card { border-color: #333333; }

    .icon-wrapper { display: flex; align-items: center; justify-content: center; }
    .icon-circle {
      width: 100px; height: 100px; border-radius: 70px;
      background-color: var(--color-accent-bg);
      display: flex; align-items: center; justify-content: center;
      transition: background-color 0.2s;
    }
    .icon-circle svg { width: 60px; height: 60px; }

    .left-section {
      display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0;
    }
    .text-wrapper { display: flex; flex-direction: column; gap: 8px; align-items: center; }

    .card-title {
      font-size: 24px; font-weight: 600; color: var(--color-darken);
      margin: 0; line-height: 1.5; letter-spacing: -0.96px; word-break: keep-all;
    }
    .card-description {
      font-size: 20px; font-weight: 400; line-height: 1.5;
      color: var(--color-text-tertiary); margin: 0; text-align: center;
      word-break: keep-all; white-space: normal; letter-spacing: -0.8px;
    }

    /* IconTitleCard desktop: title hidden in left, shown via ::before in right */
    .icon-title-card .left-section .card-title { display: none; }
    .icon-title-card .right-section {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .icon-title-card .right-section::before {
      content: attr(data-title);
      font-size: 24px; font-weight: 600; color: var(--color-darken);
      line-height: 1.5; letter-spacing: -0.96px; text-align: center;
    }

    /* Tablet (769px ~ 1429px) */
    @media (min-width: 769px) and (max-width: 1429px) {
      .main { padding: 40px 0 48px; }
      .container { padding: 0 24px; }
      .page-title { font-size: 36px; margin: 0 0 48px; letter-spacing: -1.44px; }
      .guide-box { padding: 20px; }
      .guide-box p { font-size: 18px; line-height: 27px; letter-spacing: -0.72px; }
      .service-section { margin: 24px 0; }
      .service-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .service-card { padding: 20px; gap: 24px; }
      .icon-circle { width: 80px; height: 80px; border-radius: 56px; }
      .icon-circle svg { width: 48px; height: 48px; }
      .icon-title-card .right-section::before { font-size: 20px; letter-spacing: -0.8px; }
      .card-title { font-size: 20px; }
      .card-description { font-size: 18px; letter-spacing: -0.72px; }
    }

    /* Mobile (768px and below) */
    @media (max-width: 768px) {
      .main { padding: 24px 0 40px; }
      .container { padding: 0 16px; }
      .page-title { font-size: 24px; margin: 0 0 24px; letter-spacing: -0.96px; }
      .guide-box { padding: 20px; }
      .guide-box p { font-size: 18px; line-height: 27px; letter-spacing: -0.72px; }
      .service-section { margin: 24px 0; }
      .service-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }

      .mobile-span-2 { grid-column: span 2; }

      /* IconTitleCard mobile: horizontal */
      .icon-title-card {
        flex-direction: row; align-items: center; justify-content: center;
        text-align: left; padding: 20px; gap: 24px; box-shadow: none;
      }
      .icon-title-card .left-section { gap: 8px; }
      .icon-title-card .left-section .card-title {
        display: block; font-size: 20px; letter-spacing: -0.8px;
      }
      .icon-title-card .right-section { align-items: flex-start; gap: 0; }
      .icon-title-card .right-section::before { display: none; }
      .icon-title-card .card-description { font-size: 18px; letter-spacing: -0.72px; text-align: left; }

      /* VerticalCard mobile: keep vertical, smaller */
      .vertical-card {
        flex-direction: column; align-items: center; text-align: center;
        gap: 8px; padding: 20px;
      }
      .icon-circle { width: 60px; height: 60px; border-radius: 42px; flex-shrink: 0; }
      .icon-circle svg { width: 36px; height: 36px; }
      .vertical-card .text-wrapper { align-items: center; gap: 0; }
      .vertical-card .card-title { font-size: 20px; }
      .vertical-card .card-description { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="main">
      <div class="container">
        <h1 class="page-title">진료협력센터 의뢰</h1>

        <div class="guide-box">
          <p>고려대학교 구로병원 진료협력센터는 지역병원에서 의뢰된 환자에게 최적의 의료서비스를 제공하는 3차 의료기관으로서의 기능을 수행하고 있습니다.</p>
          <p>다양한 진료의뢰시스템을 통해 지역병원 및 지역주민에게 진료의뢰 편의성을 제공하며, 신속한 의료서비스를 제공받으실 수 있도록 최선을 다하고 있습니다.</p>
        </div>

        <section class="service-section">
          <div class="service-grid">
            <!-- Card 1: 전화의뢰 (IconTitleCard, mobileSpan: 2) -->
            <div class="mobile-span-2">
              <div class="service-card icon-title-card">
                <div class="left-section">
