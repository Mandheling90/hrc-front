enum UserType {
  ADMIN
  DOCTOR
  HOSPITAL
  MEMBER
  CONSULTANT
}

enum HospitalCode {
  ANAM
  GURO
  ANSAN
}

enum Gender {
  M
  F
}

enum UserStatus {
  ACTIVE
  PENDING
  REJECTED
  WITHDRAWN
}

type UserProfile {
  birthDate: String
  department: String
  gender: Gender
  hospAddress: String
  hospAddressDetail: String
  hospCode: String
  hospName: String
  hospPhone: String
  hospWebsite: String
  hospZipCode: String
  careInstitutionNo: String
  licenseNo: String
  representative: String
  school: String
  smsConsent: Boolean!
  emailConsent: Boolean!
  replyConsent: Boolean!
  specialty: String
}

type User {
  id: ID!
  userId: String!
  email: String!
  userName: String!
  userType: UserType!
  hospitalCode: HospitalCode!
  hospitalId: String
  phone: String
  status: UserStatus!
  mustChangePw: Boolean!
  profile: UserProfile
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  refreshToken: String!
  mustChangePw: Boolean!
  user: User!
}

input LoginInput {
  userId: String!
  password: String!
}

enum DoctorType {
  DOCTOR
  DENTIST
  ORIENTAL_DOCTOR
}

input SignupInput {
  userName: String!
  birthDate: String!
  phone: String!
  doctorType: DoctorType!
  userId: String!
  password: String!
  passwordConfirm: String!
  email: String!
  licenseNo: String!
  isDirector: Boolean!
  school: String!
  department: String!
  specialty: String
  smsConsent: Boolean!
  emailConsent: Boolean!
  replyConsent: Boolean!
  hospitalCode: HospitalCode!
  hospName: String!
  careInstitutionNo: String!
  hospZipCode: String!
  hospAddress: String!
  hospAddressDetail: String
  hospPhone: String!
  hospWebsite: String
}

type UserIdAvailability {
  available: Boolean!
  existsInDb: Boolean!
  existsInEhr: Boolean!
}

input SearchCollaboratingHospitalsInput {
  hospitalCode: HospitalCode!
  hsptNm: String
  adrsNm: String
  hsptClsfCd: String
}

type HospitalModel {
  id: ID
  name: String!
  address: String
  addressDetail: String
  phisCode: String
  classificationCode: String
  phone: String
  faxNumber: String
  representative: String
  website: String
  zipCode: String
  hospitalCode: HospitalCode
  partnerType: String
  region: String
  specialties: String
  createdAt: String
  updatedAt: String
}

type HospitalSearchResult {
  hospitals: [HospitalModel!]!
  totalCount: Int!
}

input RegisterHospitalInput {
  hospitalCode: HospitalCode!
  hospitalName: String!
  representative: String!
  careInstitutionNo: String!
  zipCode: String!
  address: String!
  addressDetail: String
  phone: String!
}

# ── 협력 병·의원 신청 ──

enum PartnerStatus {
  DRAFT
  PENDING
  APPROVED
  REJECTED
  TERMINATED
}

scalar DateTime
scalar JSON

input ApplyPartnerHospitalInput {
  hospitalCode: HospitalCode!
  hospitalId: String!
  institutionType: String
  # 병원 정보
  hospitalName: String
  hospitalAddress: String
  hospitalAddressDetail: String
  hospitalZipCode: String
  hospitalPhone: String
  hospitalFaxNumber: String
  hospitalWebsite: String
  # 병원장 정보
  isDirector: Boolean
  directorName: String
  directorBirthDate: String
  directorGender: String
  directorLicenseNo: String
  directorSchool: String
  directorGraduationYear: String
  directorTrainingHospital: String
  directorDepartment: String
  directorSubSpecialty: String
  directorCarNo: String
  directorPhone: String
  directorEmail: String
  directorSmsConsent: Boolean
  directorEmailConsent: Boolean
  directorReplyConsent: Boolean
  # 실무자 정보
  staffName: String
  staffPosition: String
  staffDeptType: String
  staffDeptValue: String
  staffPhone: String
  staffTel: String
  staffEmail: String
  # 병상 및 시설
  totalBedCount: Int
  activeBedCount: Int
  icuCount: Int
  premiumRoomCount: Int
  multiRoomCount: Int
  erCount: Int
  totalStaffCount: Int
  specialistCount: Int
  nurseCount: Int
  # 시설 보유
  hasIcu: Boolean
  hasEr: Boolean
  hasOperatingRoom: Boolean
  hasPhysicalTherapy: Boolean
  hasDialysisRoom: Boolean
  hasHospice: Boolean
  hasPsychGeneral: Boolean
  hasPsychClosed: Boolean
  # 간병 시스템
  hasIntegratedNursing: Boolean
  hasGuardianCare: Boolean
  hasSharedCare: Boolean
  # 격리실
  isolationRoomCount: Int
  isolationSingleCount: Int
  isolationDoubleCount: Int
  isolationTripleCount: Int
  isolationTypes: JSON
  isolationCareType: String
  isolationRehabType: String
  # 재활
  hasRehabPt: Boolean
  hasRehabOt: Boolean
  hasRehabSt: Boolean
  hasRehabSwallow: Boolean
  hasRehabIsolation: Boolean
  # 진료과 / 처치
  departmentSpecialists: JSON
  availableTreatments: JSON
  # 의원 전용
  clinicMedicationType: String
  clinicHasHemodialysis: Boolean
  clinicHasPeritoneal: Boolean
  clinicHasPhototherapy: Boolean
  clinicHasExcimerLaser: Boolean
  # 기타
  majorEquipment: String
  remarks: String
  attachments: JSON
}

