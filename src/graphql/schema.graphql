enum UserType {
  ADMIN
  DOCTOR
  HOSPITAL
  MEMBER
  CONSULTANT
}

enum HospitalCode {
  ANAM
  GURO
  ANSAN
}

enum Gender {
  M
  F
}

enum UserStatus {
  ACTIVE
  PENDING
  REJECTED
  WITHDRAWN
}

type UserProfile {
  birthDate: String
  department: String
  gender: Gender
  hospAddress: String
  hospCode: String
  hospName: String
  licenseNo: String
  representative: String
  specialty: String
}

type User {
  id: ID!
  userId: String!
  email: String!
  userName: String!
  userType: UserType!
  hospitalCode: HospitalCode!
  phone: String
  status: UserStatus!
  mustChangePw: Boolean!
  profile: UserProfile
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  refreshToken: String!
  mustChangePw: Boolean!
  user: User!
}

input LoginInput {
  userId: String!
  password: String!
}

input SignupInput {
  userId: String!
  userName: String!
  email: String!
  password: String!
  hospitalCode: HospitalCode!
  userType: UserType!
  phone: String
  department: String
  birthDate: String
  gender: Gender
  licenseNo: String
  specialty: String
  hospName: String
  hospCode: String
  hospAddress: String
  representative: String
}

type UserIdAvailability {
  available: Boolean!
  existsInDb: Boolean!
  existsInEhr: Boolean!
}

input SearchCollaboratingHospitalsInput {
  hospitalCode: HospitalCode!
  hsptNm: String
  adrsNm: String
  hsptClsfCd: String
}

type CollaboratingHospital {
  name: String
  address: String
  addressDetail: String
  careInstitutionNo: String
  classificationCode: String
  phone: String
  representative: String
  website: String
  zipCode: String
}

type CollaboratingHospitalSearchResult {
  hospitals: [CollaboratingHospital!]!
  totalCount: Float!
}

type Query {
  me: User!
  checkUserIdAvailable(userId: String!): UserIdAvailability!
  ehrGetCollaboratingHospitals(input: SearchCollaboratingHospitalsInput!): CollaboratingHospitalSearchResult!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  signup(input: SignupInput!): AuthPayload!
  logout: Boolean!
  refreshToken(refreshToken: String!): AuthPayload!
}
