type Query {
  me: User!
  checkUserIdAvailable(userId: String!): UserIdAvailability!
  ehrGetCollaboratingHospitals(input: SearchCollaboratingHospitalsInput!): HospitalSearchResult!
  # 의뢰환자 조회
  ehrGetReferralPatients(input: ReferralPatientQueryInput!): ReferralPatientResponse!
  # 진료회신서 조회
  ehrGetReferralReply(input: ReferralReplyQueryInput!): ReferralReplyResponse!
  # 수진이력 조회
  ehrGetVisitHistory(input: VisitHistoryQueryInput!): VisitHistoryResponse!
  # 진단검사 결과 조회
  ehrGetExamResultsByDate(input: PatientDateQueryInput!): ExamResultResponse!
  # 검사 SLIP 조회 (병리/영상/내시경/기타)
  ehrGetExamSlipsByDate(input: ExamSlipQueryInput!): ExamSlipResponse!
  # 특수검사 결과 조회
  ehrGetSpecialExamResults(input: ExamSlipQueryInput!): SpecialExamResultResponse!
  # 약 처방 내역 조회
  ehrGetDrugOrders(input: DrugOrderQueryInput!): DrugOrderResponse!
  # 약 처방 상세 조회
  ehrGetDrugOrderDetail(input: DrugOrderDetailQueryInput!): DrugOrderDetailResponse!
  # 협력 병·의원 신청 조회
  myPartnerApplication(hospitalCode: HospitalCode!): PartnerHospitalModel
  myPartnerApplications(pagination: PaginationInput): PaginatedPartnerHospitalResponse!
  partnerApplicationById(id: ID!): PartnerHospitalModel!
  # 팝업/배너 조회
  slideBanners: [PopupModel!]!
  activePopups: [PopupModel!]!
  miniBanners: [PopupModel!]!
  # 병원 SNS
  hospitalSns(pageRow: Int, startIndex: Int): HospitalArticleList!
  # 병원소식
  hospitalNews(pageRow: Int, startIndex: Int): HospitalArticleList!
  # 병원 강의/교육
  hospitalLectures(pageRow: Int, startIndex: Int): HospitalArticleList!
  # 메뉴
  menus(menuType: MenuType!): [MenuModel!]!
  # 게시판
  boardPosts(boardId: String!, pagination: PaginationInput, search: String): PaginatedBoardPostResponse!
  pinnedPosts(boardId: String!): [BoardPost!]!
  boardPostById(boardId: String!, id: String!): BoardPost!
  # 첨부파일
  attachments(entityId: ID!, entityType: AttachmentEntityType!): [AttachmentModel!]!
  presignedDownloadUrl(attachmentId: ID!): String!
  # 콘텐츠
  contentById(id: String!): Content
  # 자문의 목록 조회
  medicalStaffList(filter: AdmapMedicalStaffFilterInput): MedicalStaffListResponse!
}

