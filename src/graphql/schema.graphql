input ChangePasswordInput {
  oldPassword: String!
  newPassword: String!
}

input UpdateDoctorProfileInput {
  userName: String
  email: String
  phone: String
  licenseNo: String
  isDirector: Boolean
  school: String
  department: String
  specialty: String
  doctorType: String
  smsConsent: Boolean
  emailConsent: Boolean
  replyConsent: Boolean
  hospName: String
  careInstitutionNo: String
  hospZipCode: String
  hospAddress: String
  hospAddressDetail: String
  hospPhone: String
  hospWebsite: String
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  signup(input: SignupInput!): AuthPayload!
  logout: Boolean!
  refreshToken(refreshToken: String!): AuthPayload!
  # 회원정보 수정
  updateProfile(input: UpdateProfileInput!): User!
  registerHospital(input: RegisterHospitalInput!): HospitalModel!
  # 협력 병·의원 신청
  applyPartnerHospital(input: ApplyPartnerHospitalInput!): PartnerHospitalModel!
  saveDraftPartnerApplication(input: SaveDraftPartnerInput!): PartnerHospitalModel!
  submitPartnerApplication(id: ID!): PartnerHospitalModel!
  cancelPartnerApplication(id: ID!): Boolean!
  # NICE 본인인증
  initiateVerification(input: InitiateVerificationInput!): InitiateVerificationOutput!
  completeVerification(input: CompleteVerificationInput!): VerificationResultOutput!
  findUserIdByVerification(input: FindUserIdByVerificationInput!): FindUserIdPayload!
  resetPasswordByVerification(input: ResetPasswordByVerificationInput!): MessageResponse!
  # e-Consult 신청
  createEConsult(input: CreateEConsultInput!): EConsultModel!
}

# ── e-Consult ──

input CreateEConsultInput {
  hospitalCode: HospitalCode!
  consultantId: String!
  title: String!
  content: String!
}

enum EConsultStatus {
  WAITING
  COMPLETED
  EXPIRED
}

type EConsultReplyModel {
  id: ID!
  content: String!
  repliedAt: DateTime!
}

type DoctorModel {
  id: ID!
  doctorId: String
  name: String
  departmentName: String
  email: String
}

type EConsultModel {
  id: ID!
  hospitalCode: HospitalCode!
  requesterId: String!
  requester: User
  consultantId: String!
  consultant: DoctorModel
  title: String!
  content: String!
  status: EConsultStatus!
  reply: EConsultReplyModel
  answeredAt: DateTime
  expiresAt: DateTime!
  createdAt: DateTime!
  updatedAt: DateTime!
}
