enum UserType {
  ADMIN
  DOCTOR
  HOSPITAL
  MEMBER
  CONSULTANT
}

enum HospitalCode {
  ANAM
  GURO
  ANSAN
}

enum Gender {
  M
  F
}

enum UserStatus {
  ACTIVE
  PENDING
  REJECTED
  WITHDRAWN
}

type UserProfile {
  birthDate: String
  department: String
  gender: Gender
  hospAddress: String
  hospCode: String
  hospName: String
  licenseNo: String
  representative: String
  specialty: String
}

type User {
  id: ID!
  userId: String!
  email: String!
  userName: String!
  userType: UserType!
  hospitalCode: HospitalCode!
  phone: String
  status: UserStatus!
  mustChangePw: Boolean!
  profile: UserProfile
  createdAt: String!
  updatedAt: String!
}

type AuthPayload {
  accessToken: String!
  refreshToken: String!
  mustChangePw: Boolean!
  user: User!
}

input LoginInput {
  userId: String!
  password: String!
}

enum DoctorType {
  DOCTOR
  DENTIST
  ORIENTAL_DOCTOR
}

input SignupInput {
  userName: String!
  birthDate: String!
  phone: String!
  doctorType: DoctorType!
  userId: String!
  password: String!
  passwordConfirm: String!
  email: String!
  licenseNo: String!
  isDirector: Boolean!
  school: String!
  department: String!
  specialty: String
  smsConsent: Boolean!
  emailConsent: Boolean!
  replyConsent: Boolean!
  hospitalCode: HospitalCode!
  hospName: String!
  careInstitutionNo: String!
  hospZipCode: String!
  hospAddress: String!
  hospAddressDetail: String
  hospPhone: String!
  hospWebsite: String
}

type UserIdAvailability {
  available: Boolean!
  existsInDb: Boolean!
  existsInEhr: Boolean!
}

input SearchCollaboratingHospitalsInput {
  hospitalCode: HospitalCode!
  hsptNm: String
  adrsNm: String
  hsptClsfCd: String
}

type HospitalModel {
  id: ID
  name: String!
  address: String
  addressDetail: String
  phisCode: String
  classificationCode: String
  phone: String
  representative: String
  website: String
  zipCode: String
  hospitalCode: HospitalCode
  partnerType: String
  region: String
  specialties: String
  createdAt: String
  updatedAt: String
}

type HospitalSearchResult {
  hospitals: [HospitalModel!]!
  totalCount: Int!
}

input RegisterHospitalInput {
  hospitalCode: HospitalCode!
  hospitalName: String!
  representative: String!
  careInstitutionNo: String!
  zipCode: String!
  address: String!
  addressDetail: String
  phone: String!
}


type Query {
  me: User!
  checkUserIdAvailable(userId: String!): UserIdAvailability!
  ehrGetCollaboratingHospitals(input: SearchCollaboratingHospitalsInput!): HospitalSearchResult!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  signup(input: SignupInput!): AuthPayload!
  logout: Boolean!
  refreshToken(refreshToken: String!): AuthPayload!
  registerHospital(input: RegisterHospitalInput!): HospitalModel!
}
