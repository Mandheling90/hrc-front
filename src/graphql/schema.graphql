  cursor: String
}

# ── 팝업/배너 ──

enum PopupType {
  POPUP
  MINI_BANNER
  SLIDE_BANNER
}

type PopupModel {
  id: ID!
  hospitalCode: HospitalCode!
  popupType: PopupType!
  isActive: Boolean!
  alwaysVisible: Boolean!
  targetBlank: Boolean!
  imageUrl: String
  imageDarkUrl: String
  mobileImageUrl: String
  mobileDarkImageUrl: String
  linkUrl: String
  altText: String
  mainSlogan: String
  subSlogan: String
  mediaType: String
  videoUrl: String
  sortOrder: Int
  startDate: DateTime
  endDate: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Query {
  me: User!
  checkUserIdAvailable(userId: String!): UserIdAvailability!
  ehrGetCollaboratingHospitals(input: SearchCollaboratingHospitalsInput!): HospitalSearchResult!
  # 협력 병·의원 신청 조회
  myPartnerApplication(hospitalCode: HospitalCode!): PartnerHospitalModel
  myPartnerApplications(pagination: PaginationInput): PaginatedPartnerHospitalResponse!
  partnerApplicationById(id: ID!): PartnerHospitalModel!
  # 팝업/배너 조회
  slideBanners(hospitalCode: HospitalCode!): [PopupModel!]!
  activePopups(hospitalCode: HospitalCode!): [PopupModel!]!
  miniBanners(hospitalCode: HospitalCode!): [PopupModel!]!
}

type Mutation {
  login(input: LoginInput!): AuthPayload!
  signup(input: SignupInput!): AuthPayload!
  logout: Boolean!
  refreshToken(refreshToken: String!): AuthPayload!
  registerHospital(input: RegisterHospitalInput!): HospitalModel!
  # 협력 병·의원 신청
  applyPartnerHospital(input: ApplyPartnerHospitalInput!): PartnerHospitalModel!
  saveDraftPartnerApplication(input: SaveDraftPartnerInput!): PartnerHospitalModel!
  submitPartnerApplication(id: ID!): PartnerHospitalModel!
  cancelPartnerApplication(id: ID!): Boolean!
}
